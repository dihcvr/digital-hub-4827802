  <text x="65" y="65" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ec4899" opacity="0.6">Hello</text>
  <text x="65" y="85" font-family="sans-serif" font-size="11" fill="#f472b6" opacity="0.4">How are you?</text>
  <text x="65" y="105" font-family="sans-serif" font-size="11" fill="#f472b6" opacity="0.3">Good morning</text>
  <text x="65" y="125" font-family="sans-serif" font-size="9" fill="#f9a8d4" opacity="0.3">EN</text>
  <!-- Arrow -->
  <path d="M185 90 L215 90" stroke="#ec4899" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <path d="M210 84 L218 90 L210 96" stroke="#ec4899" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right language block -->
  <rect x="230" y="35" width="130" height="110" rx="12" fill="#f472b6" opacity="0.12"/>
  <text x="255" y="65" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ec4899" opacity="0.6">Bonjour</text>
  <text x="255" y="85" font-family="sans-serif" font-size="11" fill="#f472b6" opacity="0.4">Comment vas-tu?</text>
  <text x="255" y="105" font-family="sans-serif" font-size="11" fill="#f472b6" opacity="0.3">Bonjour</text>
  <text x="255" y="125" font-family="sans-serif" font-size="9" fill="#f9a8d4" opacity="0.3">FR</text>
  <!-- Globe hint -->
  <circle cx="200" cy="150" r="15" stroke="#ec4899" stroke-width="1.5" fill="none" opacity="0.2"/>
  <ellipse cx="200" cy="150" rx="7" ry="15" stroke="#f472b6" stroke-width="1" fill="none" opacity="0.15"/>
  <line x1="185" y1="150" x2="215" y2="150" stroke="#f472b6" stroke-width="1" opacity="0.15"/>
