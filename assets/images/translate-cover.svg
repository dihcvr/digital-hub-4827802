<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="400" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="400" height="180" fill="url(#bg5)"/>
  <!-- Left language block -->
