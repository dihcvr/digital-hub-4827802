<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" fill="none">
  <defs>
    <linearGradient id="dibg" x1="0" y1="0" x2="600" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="diaccent" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
